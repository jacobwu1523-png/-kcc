<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機密訊息封裝終端</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Creepster&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

    <style>
        :root {
            --blood-red: #800000;
            --panel-bg: #111;
            --text-color: #d0d0d0;
        }

        body {
            background-color: #050505;
            color: var(--text-color);
            margin: 0;
            font-family: 'Special Elite', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 預覽區域 */
        #preview-box {
            width: 80%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 40px;
        }

        #typed-text {
            font-size: 2.5rem;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(255,0,0,0.2);
        }

        #cursor {
            display: inline-block;
            width: 12px;
            height: 2.5rem;
            background-color: var(--blood-red);
            margin-left: 8px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* 控制面板 */
        #panel {
            background: var(--panel-bg);
            padding: 20px;
            border: 1px solid #333;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        textarea {
            width: 100%;
            background: #000;
            color: #eee;
            border: 1px solid #444;
            padding: 10px;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 15px;
            resize: none;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        select, button {
            flex: 1;
            padding: 10px;
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            cursor: pointer;
            font-family: sans-serif;
        }

        #download-btn {
            background: var(--blood-red);
            color: white;
            font-weight: bold;
            border: none;
        }

        #download-btn:hover {
            background: #a00;
        }

        .hint {
            font-size: 0.7rem;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="preview-box">
        <div>
            <span id="typed-text"></span><span id="cursor"></span>
        </div>
    </div>

    <div id="panel">
        <div class="hint">編輯訊息內容</div>
        <textarea id="user-text" rows="2">這是一個不該被開啟的檔案...</textarea>
        
        <div class="hint">自訂字體風格</div>
        <div class="row">
            <select id="font-select">
                <option value="'Special Elite'">打字機 (Special Elite)</option>
                <option value="'Creepster'">恐怖電影 (Creepster)</option>
                <option value="'Ma Shan Zheng'">中式驚悚 (Ma Shan Zheng)</option>
                <option value="'Zhi Mang Xing'">瘋狂草書 (Zhi Mang Xing)</option>
            </select>
            <button onclick="playPreview()">預覽效果</button>
        </div>

        <button id="download-btn" onclick="downloadPage()">下載此網頁檔案 (.html)</button>
    </div>

    <script>
        const typedText = document.getElementById('typed-text');
        const userTextInput = document.getElementById('user-text');
        const fontSelect = document.getElementById('font-select');
        let timer = null;

        // 切換字體預覽
        fontSelect.onchange = () => {
            document.body.style.fontFamily = fontSelect.value + ", serif";
            playPreview();
        };

        function playPreview() {
            if (timer) clearInterval(timer);
            const text = userTextInput.value || "...";
            typedText.textContent = "";
            let i = 0;
            timer = setInterval(() => {
                if (i < text.length) {
                    typedText.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                }
            }, 150);
        }

        // --- 核心功能：下載成新的 HTML ---
        function downloadPage() {
            const finalContent = userTextInput.value;
            const finalFont = fontSelect.value;
            
            // 構建新網頁的代碼內容
            const htmlContent = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>收到一份機密訊息</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Creepster&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #d0d0d0; font-family: ${finalFont}, serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #text { font-size: 3rem; text-align: center; line-height: 1.5; }
        #cursor { display: inline-block; width: 12px; height: 3rem; background: #800000; margin-left: 10px; animation: b 0.8s infinite; vertical-align: middle; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="text"></div><div id="cursor"></div>
    <script>
        const t = "${finalContent.replace(/"/g, '\\"')}";
        let i = 0;
        const el = document.getElementById('text');
        const itv = setInterval(() => {
            if(i < t.length) { el.textContent += t.charAt(i); i++; }
            else { clearInterval(itv); }
        }, 200);
    <\/script>
</body>
</html>`;

            // 建立 Blob 並觸發下載
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'secret_message.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        window.onload = playPreview;
    </script>
</body>
</html>
